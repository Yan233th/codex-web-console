name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      publish_auth:
        description: npm publish authentication mode
        required: true
        default: oidc
        type: choice
        options:
          - oidc
          - npm-token
      npm_tag:
        description: npm dist-tag for manual publish
        required: true
        default: latest
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify project
        run: |
          bun run check
          bun run build

      - name: Release with semantic-release
        if: github.event_name != 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release

      - name: Publish current package version to npm
        if: github.event_name == 'workflow_dispatch'
        env:
          NPM_TOKEN: ${{ inputs.publish_auth == 'npm-token' && secrets.NPM_TOKEN || '' }}
          NODE_AUTH_TOKEN: ${{ inputs.publish_auth == 'npm-token' && secrets.NPM_TOKEN || '' }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Publishing ${PACKAGE_NAME}@${PACKAGE_VERSION} with tag ${{ inputs.npm_tag }}"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org > /dev/null 2>&1; then
            echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm. Bump package.json version before manual publish."
            exit 1
          fi
          npm publish --tag "${{ inputs.npm_tag }}"
